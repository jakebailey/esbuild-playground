name: Publish to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        name: Install pnpm

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: pnpm install
        run: pnpm install

      - name: Update esbuild
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          LATEST=$(curl https://registry.npmjs.org/esbuild/latest | jq -r '.version')
          if [[ -z "$LATEST" ]]; then
            echo "Failed to get latest version"
            exit 1
          fi
          if [[ "$LATEST" == "$(jq -r '.devDependencies.esbuild' package.json)" ]]; then
            echo "Already up to date"
            exit 0
          fi
          sed -i "s/\"esbuild\": \".*\"/\"esbuild\": \"$LATEST\"/" package.json
          sed -i "s/\"@esbuild\/wasi-preview1\": \".*\"/\"@esbuild\/wasi-preview1\": \"$LATEST\"/" package.json
          pnpm install --no-frozen-lockfile
          pnpm vendor-esbuild

      - name: Build
        run: pnpm run build

      - name: Commit update
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10
        with:
          message: Update esbuild
          default_author: github_actions

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
